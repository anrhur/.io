
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHA-256 雜湊與雪崩效應模擬器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
        }
        h1 { text-align: center; color: #1a73e8; font-size: 26px; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; font-size: 15px; margin-bottom: 25px; }
        .section { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 16px; color: #444; }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        textarea:focus { border-color: #1a73e8; outline: none; }
        .hash-box {
            background-color: #202124;
            color: #00ff00;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            word-break: break-all;
            text-align: center;
            min-height: 50px;
            letter-spacing: 1px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .hint-box {
            background-color: #e8f0fe;
            border-left: 5px solid #1a73e8;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
            color: #3c4043;
        }
        .highlight { font-weight: bold; color: #d93025; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 SHA-256 雪崩效應模擬器</h1>
    <div class="subtitle">體驗區塊鏈不可竄改的密碼學基礎（可離線使用）</div>

    <div class="section">
        <label for="inputText">1. 輸入交易資料或任意文字：</label>
        <textarea id="inputText" rows="3">100</textarea>
    </div>

    <div class="section">
        <label>2. 輸出的數位指紋 (SHA-256 Hash)：</label>
        <div id="hashOutput" class="hash-box">計算中...</div>
    </div>

    <div class="hint-box">
        <b>💡 講者演示提示：</b><br>
        請引導聽眾注意上方的文字框。目前輸入的是「100」。<br>
        現在，請試著將它改成「<span class="highlight">101</span>」（模擬駭客偷偷修改金額）。<br>
        您會發現，即使只改變一個數字，下方的 64 位元雜湊值也會產生<b>天翻地覆的變化</b>。這就是所謂的「雪崩效應」，也是為何區塊鏈上的資料一旦寫入就極難被竄改的原因！
    </div>
</div>

<script>
    // 使用瀏覽器內建的 Web Crypto API 來計算真實的 SHA-256
    async function calculateSHA256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        return hashHex;
    }

    async function updateHash() {
        const input = document.getElementById('inputText').value;
        const hashOutput = document.getElementById('hashOutput');
        
        if (input === "") {
            hashOutput.innerText = "請輸入文字以產生雜湊值";
            hashOutput.style.color = "#888";
            return;
        }

        const hash = await calculateSHA256(input);
        hashOutput.innerText = hash;
        hashOutput.style.color = "#00ff00"; // 恢復綠色
    }

    // 監聽輸入框變化，即時更新
    document.getElementById('inputText').addEventListener('input', updateHash);

    // 網頁載入時先執行一次
    updateHash();
</script>

</body>
</html>
